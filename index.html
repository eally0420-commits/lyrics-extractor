<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가사 추출기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7f7f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; }
    header p { margin-top: 6px; font-size: 0.85rem; color: #999; }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 28px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #e0e0e0;
      border-radius: 14px;
      padding: 44px 20px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }
    .drop-zone:hover { border-color: #bbb; }
    .drop-zone.dragover { border-color: #555; background: #fafafa; }
    .drop-zone.has-file { border-color: #a5d6a7; background: #f9fff9; }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .drop-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .drop-title { font-size: 0.95rem; font-weight: 600; color: #333; }
    .drop-sub { font-size: 0.78rem; color: #bbb; margin-top: 4px; }

    /* File badge */
    .file-badge {
      display: none;
      align-items: center;
      gap: 10px;
      background: #f0f7f0;
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 0.84rem;
      color: #444;
    }
    .file-badge.visible { display: flex; }
    .file-badge .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .file-badge button { background: none; border: none; color: #bbb; cursor: pointer; font-size: 1rem; }
    .file-badge button:hover { color: #666; }

    /* Extract button */
    .btn-main {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
    }
    .btn-main:hover:not(:disabled) { background: #333; }
    .btn-main:active:not(:disabled) { transform: scale(0.99); }
    .btn-main:disabled { background: #d0d0d0; cursor: not-allowed; }

    /* Progress */
    .progress { display: none; margin-top: 16px; }
    .progress.visible { display: block; }
    .bar-bg { height: 5px; background: #eee; border-radius: 99px; overflow: hidden; }
    .bar-fill {
      height: 100%;
      background: #111;
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s;
    }
    .bar-fill.pulse { animation: pulse 1.2s ease infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .bar-label { font-size: 0.78rem; color: #aaa; margin-top: 7px; text-align: center; }

    /* Error */
    .error {
      display: none;
      margin-top: 14px;
      padding: 11px 14px;
      background: #fff5f5;
      border: 1.5px solid #fcc;
      border-radius: 10px;
      font-size: 0.82rem;
      color: #c33;
    }
    .error.visible { display: block; }

    /* Result */
    .result {
      display: none;
      margin-top: 20px;
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }
    .result.visible { display: block; }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .result-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #ccc; }
    .actions { display: flex; gap: 7px; }
    .btn-sm {
      padding: 5px 11px;
      border-radius: 7px;
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid #e8e8e8;
      background: #fafafa;
      color: #555;
      transition: background 0.12s;
    }
    .btn-sm:hover { background: #f0f0f0; }

    .lyrics {
      font-size: 0.93rem;
      line-height: 1.9;
      color: #222;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Translate section */
    .divider { border: none; border-top: 1.5px solid #f2f2f2; margin: 18px 0; }

    .btn-translate {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: #f5f5f5;
      color: #333;
      border: none;
      border-radius: 10px;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-translate:hover { background: #ebebeb; }
    .btn-translate:disabled { opacity: 0.4; cursor: not-allowed; }

    .trans-status { font-size: 0.78rem; color: #aaa; margin-top: 10px; display: none; }
    .trans-status.visible { display: block; }

    .pair-block { display: none; }
    .pair-block.visible { display: block; }

    .pair { margin-bottom: 12px; }
    .pair-orig { font-size: 0.82rem; color: #bbb; line-height: 1.6; }
    .pair-trans { font-size: 0.93rem; color: #111; font-weight: 500; line-height: 1.75; }

    footer { margin-top: 32px; font-size: 0.74rem; color: #ccc; }
  </style>
</head>
<body>

<header>
  <h1>🎵 가사 추출기</h1>
  <p>음원을 올리면 AI가 가사를 뽑아줍니다 · 완전 무료</p>
</header>

<div class="card">
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="audio/*,.mp3,.mp4,.m4a,.wav,.webm,.flac,.ogg" />
    <div class="drop-icon">🎧</div>
    <div class="drop-title">파일을 끌어다 놓거나 클릭하세요</div>
    <div class="drop-sub">MP3 · WAV · M4A · FLAC · OGG · WEBM</div>
  </div>

  <div class="file-badge" id="fileBadge">
    <span>🎵</span>
    <span class="name" id="fileName"></span>
    <button id="removeFile">✕</button>
  </div>

  <button class="btn-main" id="extractBtn" disabled>가사 추출하기</button>

  <div class="progress" id="progress">
    <div class="bar-bg"><div class="bar-fill pulse" id="barFill"></div></div>
    <div class="bar-label" id="barLabel">준비 중...</div>
  </div>

  <div class="error" id="errorMsg"></div>
</div>

<div class="result" id="result">
  <div class="result-top">
    <span class="result-label">원문</span>
    <div class="actions">
      <button class="btn-sm" id="copyBtn">복사</button>
      <button class="btn-sm" id="downloadBtn">저장</button>
    </div>
  </div>
  <div class="lyrics" id="lyricsText"></div>

  <div class="divider"></div>

  <button class="btn-translate" id="translateBtn">🌐 한국어 번역</button>
  <div class="trans-status" id="transStatus"></div>

  <div class="pair-block" id="pairBlock">
    <div class="divider"></div>
    <div class="result-label" style="margin-bottom:12px;">원문 · 번역</div>
    <div id="pairs"></div>
  </div>
</div>

<footer>브라우저에서 실행 · 파일 외부 전송 없음</footer>

<script type="module">
  import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.min.js';

  env.allowLocalModels = false;

  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const fileBadge   = document.getElementById('fileBadge');
  const fileName    = document.getElementById('fileName');
  const removeFile  = document.getElementById('removeFile');
  const extractBtn  = document.getElementById('extractBtn');
  const progress    = document.getElementById('progress');
  const barFill     = document.getElementById('barFill');
  const barLabel    = document.getElementById('barLabel');
  const errorMsg    = document.getElementById('errorMsg');
  const result      = document.getElementById('result');
  const lyricsText  = document.getElementById('lyricsText');
  const copyBtn     = document.getElementById('copyBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const translateBtn= document.getElementById('translateBtn');
  const transStatus = document.getElementById('transStatus');
  const pairBlock   = document.getElementById('pairBlock');
  const pairs       = document.getElementById('pairs');

  let selectedFile = null;
  let translator   = null;

  // ── 파일 선택 ──
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
  removeFile.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    fileBadge.classList.remove('visible');
    dropZone.classList.remove('has-file');
    extractBtn.disabled = true;
  });

  function setFile(f) {
    selectedFile = f;
    fileName.textContent = f.name;
    fileBadge.classList.add('visible');
    dropZone.classList.add('has-file');
    errorMsg.classList.remove('visible');
    extractBtn.disabled = false;
  }

  // ── 오디오 디코딩 ──
  async function decodeAudio(file) {
    const buf = await file.arrayBuffer();
    const ctx = new AudioContext({ sampleRate: 16000 });
    const decoded = await ctx.decodeAudioData(buf);
    return decoded.getChannelData(0);
  }

  // ── 가사 추출 ──
  extractBtn.addEventListener('click', async () => {
    errorMsg.classList.remove('visible');
    result.classList.remove('visible');
    pairBlock.classList.remove('visible');
    progress.classList.add('visible');
    barFill.style.width = '0%';
    barFill.classList.add('pulse');
    barLabel.textContent = '모델 로딩 중...';
    extractBtn.disabled = true;

    try {
      const transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-small', {
        progress_callback: (p) => {
          if (p.status === 'downloading') {
            const pct = p.total ? Math.round((p.loaded / p.total) * 100) : 0;
            barFill.classList.remove('pulse');
            barFill.style.width = pct + '%';
            barLabel.textContent = `모델 다운로드 ${pct}%`;
          } else if (p.status === 'loading') {
            barFill.classList.add('pulse');
            barLabel.textContent = '모델 준비 중...';
          }
        }
      });

      barLabel.textContent = '음원 분석 중...';
      const audioData = await decodeAudio(selectedFile);

      const totalSec = Math.round(audioData.length / 16000);
      let done = 0;
      const chunkSec = 30;
      const totalChunks = Math.ceil(totalSec / chunkSec);

      const res = await transcriber(audioData, {
        task: 'transcribe',
        chunk_length_s: 30,
        stride_length_s: 4,
        return_timestamps: false,
        temperature: 0,
        callback_function: () => {
          done++;
          const pct = Math.min(Math.round((done / totalChunks) * 100), 98);
          barFill.classList.remove('pulse');
          barFill.style.width = pct + '%';
          barLabel.textContent = `변환 중 ${pct}% · 약 ${Math.round((totalSec - done * chunkSec) / 1)}초 남음`;
        },
      });

      lyricsText.textContent = res.text.trim();
      result.classList.add('visible');
      barFill.style.width = '100%';
      barLabel.textContent = '완료!';
      setTimeout(() => progress.classList.remove('visible'), 900);
    } catch (e) {
      progress.classList.remove('visible');
      errorMsg.textContent = e.message || '오류가 발생했습니다.';
      errorMsg.classList.add('visible');
    } finally {
      extractBtn.disabled = false;
    }
  });

  // ── 복사 ──
  copyBtn.addEventListener('click', async () => {
    await navigator.clipboard.writeText(lyricsText.textContent);
    copyBtn.textContent = '복사됨 ✓';
    setTimeout(() => copyBtn.textContent = '복사', 1800);
  });

  // ── 저장 ──
  downloadBtn.addEventListener('click', () => {
    let content = lyricsText.textContent;
    if (pairBlock.classList.contains('visible')) {
      content = Array.from(pairs.querySelectorAll('.pair')).map(p =>
        (p.querySelector('.pair-orig')?.textContent || '') + '\n' +
        (p.querySelector('.pair-trans')?.textContent || '')
      ).join('\n\n');
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain;charset=utf-8' }));
    a.download = (selectedFile?.name.replace(/\.[^.]+$/, '') || 'lyrics') + '_가사.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // ── 번역 ──
  translateBtn.addEventListener('click', async () => {
    const text = lyricsText.textContent.trim();
    if (!text) return;

    translateBtn.disabled = true;
    pairBlock.classList.remove('visible');
    pairs.innerHTML = '';
    transStatus.textContent = '번역 모델 로딩 중...';
    transStatus.classList.add('visible');

    try {
      if (!translator) {
        translator = await pipeline('translation', 'Xenova/opus-mt-tc-big-en-ko', {
          progress_callback: (p) => {
            if (p.status === 'downloading') {
              const pct = p.total ? Math.round((p.loaded / p.total) * 100) : 0;
              transStatus.textContent = `번역 모델 다운로드 ${pct}%...`;
            }
          }
        });
      }

      transStatus.textContent = '번역 중...';
      const lines = text.split('\n');

      for (const line of lines) {
        if (!line.trim()) continue;
        const out = await translator(line);
        const t = toLyric(out[0].translation_text);

        const div = document.createElement('div');
        div.className = 'pair';
        div.innerHTML =
          '<div class="pair-orig">' + esc(line) + '</div>' +
          '<div class="pair-trans">' + esc(t) + '</div>';
        pairs.appendChild(div);
      }

      pairBlock.classList.add('visible');
    } catch (e) {
      errorMsg.textContent = '번역 오류: ' + e.message;
      errorMsg.classList.add('visible');
    } finally {
      translateBtn.disabled = false;
      transStatus.classList.remove('visible');
    }
  });

  function toLyric(t) {
    return t
      .replace(/합니다$/, '해').replace(/입니다$/, '이야')
      .replace(/있습니다$/, '있어').replace(/없습니다$/, '없어')
      .replace(/했습니다$/, '했어').replace(/됩니다$/, '돼')
      .replace(/이다$/, '이야').replace(/하였다$/, '했어')
      .replace(/하다$/, '해').replace(/한다$/, '해')
      .replace(/된다$/, '돼').replace(/겠다$/, '겠어')
      .replace(/었다$/, '었어').replace(/았다$/, '았어')
      .replace(/그리고\s+/, '').replace(/\.$/, '');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
